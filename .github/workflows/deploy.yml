name: Deploy to GitHub Pages

# Auto-build & deploy on every push to main (plus a manual "Run workflow" button)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes cancel an in-flight run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # No build step — the game is static HTML/JS. Publish the repo root as-is.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
