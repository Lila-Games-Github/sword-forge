<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sword Forge — Chalk Map Test</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1c1712; overflow: hidden; font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; user-select: none; }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100vh; padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }

    #hud { width: min(96vw, 520px); display: flex; flex-direction: column; gap: 5px; flex: 0 0 auto; }
    #topline { display: flex; justify-content: space-between; align-items: center; color: #f0e6d2; font-size: 13px; font-weight: bold; text-shadow: 0 1px 2px #000; }
    .bar-row { display: flex; align-items: center; gap: 8px; }
    .bar-label { width: 54px; font-size: 12px; font-weight: bold; color: #f0e6d2; text-shadow: 0 1px 2px #000; }
    .bar-track { flex: 1; height: 13px; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.25); border-radius: 7px; overflow: hidden; }
    .bar-fill { height: 100%; width: 100%; transition: width 0.08s linear; }
    #hp-fill { background: linear-gradient(90deg,#e74c3c,#ff7a6b); }
    #chalk-fill { background: linear-gradient(90deg,#dfe6e9,#ffffff); }

    #stage { position: relative; touch-action: none; flex: 0 0 auto; box-shadow: 0 0 40px rgba(0,0,0,0.8); border: 3px solid #4a3623; border-radius: 6px; overflow: hidden; background: #d8c48f; }
    #map, #fog { position: absolute; top: 0; left: 0; display: block; }
    #fog { pointer-events: none; }

    #controls { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; width: min(96vw, 520px); justify-content: center; }
    .zbtn { width: 46px; height: 46px; border-radius: 10px; background: #4a3623; color: #f0d8a0; border: 1px solid #c8a84b; font-size: 24px; font-weight: bold; line-height: 1; cursor: pointer; flex: 0 0 auto; }
    #endday { flex: 1; max-width: 260px; background: #4a3623; color: #f0d8a0; border: 1px solid #c8a84b; border-radius: 12px; padding: 13px 16px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .zbtn:active, #endday:active { transform: scale(0.95); }

    #hint { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); z-index: 20; color: #fff; font-size: 11px; opacity: 0.8; text-shadow: 0 1px 3px #000; white-space: nowrap; pointer-events: none; }
    #toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 20; background: rgba(44,33,22,0.94); color: #f0d8a0; border: 1px solid #c8a84b; border-radius: 18px; padding: 9px 20px; font-size: 15px; font-weight: bold; box-shadow: 0 4px 14px rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="wrap">
    <div id="hud">
        <div id="topline"><span>Day <span id="day-num">1</span></span><span>Traits <span id="found-num">0</span>/<span id="total-num">0</span></span></div>
        <div class="bar-row"><span class="bar-label">❤️ HP</span><div class="bar-track"><div id="hp-fill" class="bar-fill"></div></div></div>
        <div class="bar-row"><span class="bar-label">✏️ Chalk</span><div class="bar-track"><div id="chalk-fill" class="bar-fill"></div></div></div>
    </div>
    <div id="stage">
        <canvas id="map"></canvas>
        <div id="hint">Drag from the chalk tip to draw · pinch or ± to zoom</div>
        <div id="toast"></div>
    </div>
    <div id="controls">
        <button class="zbtn" id="zoomout">−</button>
        <button id="endday">🌙 End Day</button>
        <button class="zbtn" id="zoomin">+</button>
    </div>
</div>

<script>
// ---- Tuning ----
const MAP_SRC = 'map_test.png';
const SWORD_SRC = '../assets/map/tile_sword.png';
const WORLD = 1890;                 // native map size (square)
const SPAWN = { x: 945, y: 945 };
const SWORD_PX = 34;                // sword icon SCREEN size (constant, independent of zoom)
const GRAB_R = 50;                  // must touch within this many screen px of the sword to drag it
const MARKER_FONT = 22;             // emoji size (base css px, scales with zoom)
const MOVE_SPEED = 9;               // world px the smith advances toward the finger per frame
const CHALK_MAX = 5200;             // daily distance budget (world px)
const FOG_REVEAL = 60;              // fog clear radius (base css px)
const DISCOVER_R = 55;              // reach this close to a ❓ to discover it (world px)
const HAZ_LUM = 175;               // tan terrain darker than this = hazard (bg≈200, dark squiggle≈150)
const HAZ_DMG = 32;                 // HP drained per second in a hazard
const N_MARKERS = 12;
const ZOOM_MIN = 1, ZOOM_MAX = 9;
const TRAIT_EMOJI = ['🔥','❄️','⚡','🌊','☠️','🛡️','☄️','🌑','🌸','💀','🩸','⚖️','🌿','⭐','🗡️'];

// ---- State ----
let stageEl, mapCanvas, mapCtx, fogCanvas, fogCtx, disp = 0, S = 1, dpr = 1;
let pix = null;
const sword = { x: SPAWN.x, y: SPAWN.y };
const cam = { zoom: 1, panX: 0, panY: 0 };
let finger = null, health = 100, chalk = CHALK_MAX, day = 1;
let markers = [], trail = [];
let mapImg = new Image(), swordImg = new Image();
let lastT = 0, hazardFlash = 0;
// input
const pointers = new Map();
let mode = 'none', lastPan = null, pinch0 = null;

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ---- Hazard (tan terrain: light bg ≈200, dark squiggle ≈150; ❓/dots are other hues) ----
function isTan(r,g,b){ return b<=r && b<=g && (r-b)>20 && Math.abs(r-g)<45 && !(g>r+15); }
function isHazard(wx, wy) {
    wx = Math.round(wx); wy = Math.round(wy); let sum = 0, n = 0;
    for (let dy=-6; dy<=6; dy+=2) for (let dx=-6; dx<=6; dx+=2) {
        const x=wx+dx, y=wy+dy; if (x<0||y<0||x>=WORLD||y>=WORLD) continue;
        const i=(y*WORLD+x)*4, r=pix[i], g=pix[i+1], b=pix[i+2];
        if (!isTan(r,g,b)) continue; sum += 0.3*r+0.59*g+0.11*b; n++;
    }
    return n>0 && (sum/n) < HAZ_LUM;
}
function findSpawn(cx, cy) {
    if (!isHazard(cx,cy)) return { x:cx, y:cy };
    for (let r=20; r<900; r+=20) for (let a=0; a<360; a+=15) {
        const x=cx+Math.cos(a*Math.PI/180)*r, y=cy+Math.sin(a*Math.PI/180)*r;
        if (x>60&&y>60&&x<WORLD-60&&y<WORLD-60&&!isHazard(x,y)) return { x:Math.round(x), y:Math.round(y) };
    }
    return { x:cx, y:cy };
}
function placeMarkers() {
    const rng = mulberry32(20240714); markers = []; let guard = 0;
    while (markers.length < N_MARKERS && guard < 5000) {
        guard++;
        const x = 120+rng()*(WORLD-240), y = 120+rng()*(WORLD-240);
        if (isHazard(x,y)) continue;
        if (Math.hypot(x-SPAWN.x, y-SPAWN.y) < 260) continue;
        if (markers.some(m => Math.hypot(m.x-x, m.y-y) < 220)) continue;
        markers.push({ x, y, emoji: TRAIT_EMOJI[Math.floor(rng()*TRAIT_EMOJI.length)], found: false });
    }
    document.getElementById('total-num').textContent = markers.length;
}

// ---- Camera helpers (base coords = world*S; screen = base*zoom + pan) ----
function worldToScreen(wx, wy){ return { x: wx*S*cam.zoom + cam.panX, y: wy*S*cam.zoom + cam.panY }; }
function clampCam(){
    cam.zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, cam.zoom));
    const span = WORLD*S*cam.zoom, minPan = disp - span;
    cam.panX = Math.min(0, Math.max(minPan, cam.panX));
    cam.panY = Math.min(0, Math.max(minPan, cam.panY));
}
function zoomBy(f){
    const cx = disp/2, cy = disp/2;
    const bx = (cx-cam.panX)/cam.zoom, by = (cy-cam.panY)/cam.zoom; // base coord under centre
    cam.zoom *= f; clampCam();
    cam.panX = cx - bx*cam.zoom; cam.panY = cy - by*cam.zoom; clampCam();
}

// ---- Layout ----
function layout() {
    const hudH = document.getElementById('hud').offsetHeight;
    const ctlH = document.getElementById('controls').offsetHeight;
    const availW = window.innerWidth - 16;
    const availH = window.innerHeight - hudH - ctlH - 40; // padding + gaps
    disp = Math.max(220, Math.min(availW, availH, 820));
    S = disp / WORLD;
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    stageEl.style.width = disp + 'px'; stageEl.style.height = disp + 'px';
    [mapCanvas, fogCanvas].forEach(c => { c.style.width = disp+'px'; c.style.height = disp+'px'; c.width = Math.round(disp*dpr); c.height = Math.round(disp*dpr); });
    clampCam();
    resetFog();
}
function resetFog() {
    fogCtx.setTransform(dpr,0,0,dpr,0,0);
    fogCtx.globalCompositeOperation = 'source-over';
    fogCtx.fillStyle = 'rgba(14,10,7,0.92)';
    fogCtx.fillRect(0,0,disp,disp);
    trail.forEach(p => revealAt(p.x, p.y));
    revealAt(sword.x, sword.y);
}
function revealAt(wx, wy) {
    fogCtx.globalCompositeOperation = 'destination-out';
    fogCtx.beginPath(); fogCtx.arc(wx*S, wy*S, FOG_REVEAL, 0, Math.PI*2); fogCtx.fill();
    fogCtx.globalCompositeOperation = 'source-over';
}

// ---- Input ----
function screenPt(e){ const r = stageEl.getBoundingClientRect(); return { x: e.clientX-r.left, y: e.clientY-r.top }; }
function ptToWorld(p){ return { x: Math.max(0, Math.min(WORLD, (p.x-cam.panX)/(S*cam.zoom))), y: Math.max(0, Math.min(WORLD, (p.y-cam.panY)/(S*cam.zoom))) }; }
function startPinch(){ const p = [...pointers.values()]; pinch0 = { dist: Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y), mx:(p[0].x+p[1].x)/2, my:(p[0].y+p[1].y)/2, zoom:cam.zoom, panX:cam.panX, panY:cam.panY }; }
function updatePinch(){
    const p = [...pointers.values()]; if (p.length < 2) return;
    const dist = Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y), mx=(p[0].x+p[1].x)/2, my=(p[0].y+p[1].y)/2;
    const baseX = (pinch0.mx-pinch0.panX)/pinch0.zoom, baseY = (pinch0.my-pinch0.panY)/pinch0.zoom;
    cam.zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, pinch0.zoom * dist/pinch0.dist));
    cam.panX = mx - baseX*cam.zoom; cam.panY = my - baseY*cam.zoom; clampCam();
}
function initInput() {
    stageEl.addEventListener('pointerdown', e => {
        e.preventDefault(); const p = screenPt(e); pointers.set(e.pointerId, p);
        try { stageEl.setPointerCapture(e.pointerId); } catch(_){}
        if (pointers.size === 1) {
            const ss = worldToScreen(sword.x, sword.y);
            if (Math.hypot(p.x-ss.x, p.y-ss.y) < GRAB_R) { mode='sword'; finger = ptToWorld(p); } // grabbed the sword
            else { mode='pan'; lastPan = p; }                                                     // else pan the chart
        } else if (pointers.size === 2) { mode='pinch'; startPinch(); }
    });
    stageEl.addEventListener('pointermove', e => {
        if (!pointers.has(e.pointerId)) return; e.preventDefault();
        const p = screenPt(e); pointers.set(e.pointerId, p);
        if (mode === 'sword') finger = ptToWorld(p);
        else if (mode === 'pan') { cam.panX += p.x-lastPan.x; cam.panY += p.y-lastPan.y; lastPan = p; clampCam(); }
        else if (mode === 'pinch') updatePinch();
    });
    const up = e => {
        pointers.delete(e.pointerId);
        if (pointers.size === 0) { mode='none'; finger=null; }
        else if (pointers.size === 1) { mode='pan'; lastPan = [...pointers.values()][0]; } // after a pinch, remaining finger pans (must re-grab the sword to move it)
    };
    stageEl.addEventListener('pointerup', up); stageEl.addEventListener('pointercancel', up);
    document.getElementById('zoomin').addEventListener('click', () => zoomBy(1.4));
    document.getElementById('zoomout').addEventListener('click', () => zoomBy(1/1.4));
}

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1700); }
function endDay(){ day++; chalk=CHALK_MAX; health=100; sword.x=SPAWN.x; sword.y=SPAWN.y; finger=null; mode='none'; pointers.clear(); document.getElementById('day-num').textContent=day; resetFog(); toast('☀️ A new day — fresh chalk'); }

// ---- Loop ----
function tick(t) {
    const dt = Math.min(0.05, (t-lastT)/1000 || 0); lastT = t;
    if (mode === 'sword' && finger && chalk > 0) {
        const dx = finger.x-sword.x, dy = finger.y-sword.y, d = Math.hypot(dx,dy);
        if (d > 1) {
            const step = Math.min(MOVE_SPEED, d, chalk);
            const nx = sword.x+dx/d*step, ny = sword.y+dy/d*step;
            const steps = Math.ceil(step/12);
            for (let i=1;i<=steps;i++) revealAt(sword.x+(nx-sword.x)*i/steps, sword.y+(ny-sword.y)*i/steps);
            sword.x = nx; sword.y = ny; chalk -= step; trail.push({ x:sword.x, y:sword.y });
        }
    }
    if (isHazard(sword.x, sword.y)) {
        health -= HAZ_DMG*dt; hazardFlash = 1;
        if (health <= 0) { health = 100; sword.x=SPAWN.x; sword.y=SPAWN.y; trail.push({x:SPAWN.x,y:SPAWN.y}); revealAt(SPAWN.x,SPAWN.y); toast('💥 The smith fled home!'); }
    }
    hazardFlash = Math.max(0, hazardFlash-dt*3);
    let found = 0;
    markers.forEach(m => { if (!m.found && Math.hypot(m.x-sword.x, m.y-sword.y) < DISCOVER_R) { m.found=true; toast(m.emoji+' Trait discovered!'); } if (m.found) found++; });
    document.getElementById('found-num').textContent = found;
    render();
    document.getElementById('hp-fill').style.width = Math.max(0,health)+'%';
    document.getElementById('chalk-fill').style.width = (chalk/CHALK_MAX*100)+'%';
    requestAnimationFrame(tick);
}

function render() {
    mapCtx.setTransform(dpr,0,0,dpr,0,0);
    mapCtx.clearRect(0,0,disp,disp);
    mapCtx.save();
    mapCtx.translate(cam.panX, cam.panY); mapCtx.scale(cam.zoom, cam.zoom); // base coords (world*S)
    mapCtx.drawImage(mapImg, 0, 0, disp, disp);
    if (trail.length > 1) {
        mapCtx.strokeStyle = 'rgba(255,255,255,0.72)'; mapCtx.lineWidth = 4/cam.zoom; mapCtx.lineJoin='round'; mapCtx.lineCap='round';
        mapCtx.beginPath(); mapCtx.moveTo(trail[0].x*S, trail[0].y*S);
        for (let i=1;i<trail.length;i++) mapCtx.lineTo(trail[i].x*S, trail[i].y*S);
        mapCtx.stroke();
    }
    mapCtx.textAlign='center'; mapCtx.textBaseline='middle'; mapCtx.font = MARKER_FONT+'px serif';
    markers.forEach(m => mapCtx.fillText(m.found ? m.emoji : '❓', m.x*S, m.y*S));
    mapCtx.drawImage(fogCanvas, 0, 0, disp, disp);
    mapCtx.restore();

    if (hazardFlash > 0) { mapCtx.fillStyle = 'rgba(231,76,60,'+(0.28*hazardFlash)+')'; mapCtx.fillRect(0,0,disp,disp); }

    // chalk tip — the point you drag to keep drawing (no sword sprite; just the path)
    const ss = worldToScreen(sword.x, sword.y);
    mapCtx.beginPath(); mapCtx.arc(ss.x, ss.y, 5, 0, Math.PI*2); mapCtx.fillStyle='rgba(255,255,255,0.95)'; mapCtx.fill();
    mapCtx.beginPath(); mapCtx.arc(ss.x, ss.y, 9, 0, Math.PI*2); mapCtx.strokeStyle='rgba(255,255,255,0.4)'; mapCtx.lineWidth=2; mapCtx.stroke();
}

// ---- Boot ----
function boot() {
    stageEl = document.getElementById('stage');
    mapCanvas = document.getElementById('map'); mapCtx = mapCanvas.getContext('2d');
    fogCanvas = document.createElement('canvas'); fogCtx = fogCanvas.getContext('2d'); // offscreen: composited into the map with the camera so it follows zoom/pan
    document.getElementById('endday').addEventListener('click', endDay);
    window.addEventListener('resize', layout);
    initInput();
    mapImg.onload = init; mapImg.src = MAP_SRC;
}
function init() {
    const off = document.createElement('canvas'); off.width=WORLD; off.height=WORLD;
    const octx = off.getContext('2d', { willReadFrequently:true });
    octx.drawImage(mapImg, 0, 0, WORLD, WORLD);
    pix = octx.getImageData(0, 0, WORLD, WORLD).data;
    const sp = findSpawn(SPAWN.x, SPAWN.y); SPAWN.x=sp.x; SPAWN.y=sp.y; sword.x=sp.x; sword.y=sp.y;
    placeMarkers();
    layout();
    trail.push({ x:sword.x, y:sword.y }); revealAt(sword.x, sword.y);
    requestAnimationFrame(t => { lastT=t; requestAnimationFrame(tick); });
}
boot();
window._t = { get sword(){return sword;}, get cam(){return cam;}, get mode(){return mode;}, get finger(){return finger;}, get health(){return health;}, get chalk(){return chalk;}, get markers(){return markers;}, get pix(){return pix;}, isHazard, endDay, zoomBy, worldToScreen };
</script>
</body>
</html>
