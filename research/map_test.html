<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sword Forge — Chalk Map Test</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1c1712; overflow: hidden; font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; user-select: none; }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100vh; padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }

    #hud { width: min(96vw, 520px); display: flex; flex-direction: column; gap: 5px; flex: 0 0 auto; }
    #topline { display: flex; justify-content: space-between; align-items: center; color: #f0e6d2; font-size: 13px; font-weight: bold; text-shadow: 0 1px 2px #000; }
    .bar-row { display: flex; align-items: center; gap: 8px; }
    .bar-label { width: 54px; font-size: 12px; font-weight: bold; color: #f0e6d2; text-shadow: 0 1px 2px #000; }
    .bar-track { flex: 1; height: 13px; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.25); border-radius: 7px; overflow: hidden; }
    .bar-fill { height: 100%; width: 100%; transition: width 0.08s linear; }
    #hp-fill { background: linear-gradient(90deg,#e74c3c,#ff7a6b); }
    #chalk-fill { background: linear-gradient(90deg,#dfe6e9,#ffffff); }

    #stage { position: relative; touch-action: none; flex: 0 0 auto; box-shadow: 0 0 40px rgba(0,0,0,0.8); border: 3px solid #4a3623; border-radius: 6px; overflow: hidden; background: #d8c48f; }
    #map { position: absolute; top: 0; left: 0; display: block; }

    #controls { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; width: min(96vw, 520px); justify-content: center; }
    .zbtn { width: 46px; height: 46px; border-radius: 10px; background: #4a3623; color: #f0d8a0; border: 1px solid #c8a84b; font-size: 24px; font-weight: bold; line-height: 1; cursor: pointer; flex: 0 0 auto; }
    #endday { flex: 1; max-width: 260px; background: #4a3623; color: #f0d8a0; border: 1px solid #c8a84b; border-radius: 12px; padding: 13px 16px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .zbtn:active, #endday:active { transform: scale(0.95); }

    #hint { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); z-index: 20; color: #fff; font-size: 11px; opacity: 0.8; text-shadow: 0 1px 3px #000; white-space: nowrap; pointer-events: none; }
    #downed { position: absolute; top: 42%; left: 50%; transform: translate(-50%,-50%); z-index: 21; display: none; background: rgba(140,25,20,0.92); color: #ffe0d0; border: 1px solid #ff8a6b; border-radius: 14px; padding: 10px 22px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 14px rgba(0,0,0,0.6); pointer-events: none; white-space: nowrap; }
    #toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 20; background: rgba(44,33,22,0.94); color: #f0d8a0; border: 1px solid #c8a84b; border-radius: 18px; padding: 9px 20px; font-size: 15px; font-weight: bold; box-shadow: 0 4px 14px rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="wrap">
    <div id="hud">
        <div id="topline"><span>Day <span id="day-num">1</span></span><span>Traits <span id="found-num">0</span>/<span id="total-num">0</span></span><span>Parts <span id="parts-num">0</span></span></div>
        <div class="bar-row"><span class="bar-label">❤️ HP</span><div class="bar-track"><div id="hp-fill" class="bar-fill"></div></div></div>
        <div class="bar-row"><span class="bar-label">✏️ Chalk</span><div class="bar-track"><div id="chalk-fill" class="bar-fill"></div></div></div>
    </div>
    <div id="stage">
        <canvas id="map"></canvas>
        <div id="hint">Hold the chalk and drag to draw · pinch or ± to zoom</div>
        <div id="downed"></div>
        <div id="toast"></div>
    </div>
    <div id="controls">
        <button class="zbtn" id="zoomout">−</button>
        <button id="endday">🌙 End Day</button>
        <button class="zbtn" id="zoomin">+</button>
    </div>
</div>

<script>
// ---- Tuning ----
const MAP_SRC = 'map_test.png';
const CHALK_SRC = 'chalk.png';
const WORLD = 1890;                 // native map size (square)
const SPAWN = { x: 945, y: 945 };
const CHALK_DISP_H = 140;           // chalk sprite height on screen (px)
const CHALK_ASPECT = 1065/1397;     // chalk.png w/h
const CHALK_TIP = { fx: 0.10, fy: 0.08 }; // writing tip = the chalk's upper (top-left) end
const MARKER_FONT = 8;              // trait emoji size (base css px, scales with zoom) — 3x smaller
const MOVE_SPEED = 10;              // world px the tip advances toward the finger per frame
const CHALK_MAX = 1300;             // daily distance budget (world px) — halved again
const FOG_REVEAL = 20;              // fog clear radius (base css px) — 3x smaller
const DISCOVER_R = 55;              // reach this close to a trait to gather it (world px)
const DOT_R = 46;                   // reach this close to a green/purple dot to collect it (world px)
const GREEN_PART_CHANCE = 0.05;     // green dot → sword-part design
const HAZ_LUM = 175;               // tan terrain darker than this = hazard
const HAZ_DMG = 70;                 // HP drained per second in a hazard (increased)
const ZOOM_MIN = 1, ZOOM_MAX = 9;
const TRAIT_EMOJI = ['🔥','❄️','⚡','🌊','☠️','🛡️','☄️','🌑','🌸','💀','🩸','⚖️','🌿','⭐','🗡️','🌋','🌟'];
const TAN = '#d8c892';

// ---- State ----
let stageEl, mapCanvas, ctx, disp = 0, S = 1, dpr = 1;
let pix = null, fogCanvas, fogCtx;
const sword = { x: SPAWN.x, y: SPAWN.y };   // the chalk tip / path position
const cam = { zoom: 1, panX: 0, panY: 0 };
let grabOffset = { x: 0, y: 0 }, health = 100, chalk = CHALK_MAX, day = 1, parts = 0, downedT = 0;
let traits = [], greens = [], trail = [];
let mapImg = new Image(), chalkImg = new Image();
let lastT = 0, hazardFlash = 0;
const pointers = new Map();
let mode = 'none', lastPan = null, pinch0 = null;

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ---- Colour classification for the baked-in map markers ----
function isRed(r,g,b){ return r>150 && g<115 && b<115 && (r-g)>55 && (r-b)>55; }
function isGreen(r,g,b){ return g>r+15 && g>b+22 && g>95; }
function isPurple(r,g,b){ return r>80 && b>75 && (r-g)>22 && (b-g)>18; }
function cluster(classFn, step, mergeDist, minN){
    const arr=[];
    for(let y=0;y<WORLD;y+=step) for(let x=0;x<WORLD;x+=step){
        const i=(y*WORLD+x)*4; if(!classFn(pix[i],pix[i+1],pix[i+2])) continue;
        let hit=null; for(const b of arr){ if(Math.abs(b.x-x)<mergeDist && Math.abs(b.y-y)<mergeDist){ hit=b; break; } }
        if(hit){ hit.x=(hit.x*hit.n+x)/(hit.n+1); hit.y=(hit.y*hit.n+y)/(hit.n+1); hit.n++; } else arr.push({x,y,n:1});
    }
    return arr.filter(b=>b.n>=minN);
}
function buildMarkers(){
    const reds = cluster(isRed, 3, 90, 3);        // merge '?' glyph + its dot into one
    const grn  = cluster(isGreen, 3, 34, 3);
    const pur  = cluster(isPurple, 3, 34, 3);
    traits = reds.map((r,i)=>({ x:r.x, y:r.y, emoji:TRAIT_EMOJI[i%TRAIT_EMOJI.length], unlocked:false, gathered:false, warned:false, dots:[] }));
    const used = new Set();
    traits.forEach(t=>{                           // the 3 nearest purple dots around each trait must be gathered to unlock it
        pur.map((p,idx)=>({idx,d:Math.hypot(p.x-t.x,p.y-t.y)}))
           .filter(c=>!used.has(c.idx) && c.d<280).sort((a,b)=>a.d-b.d).slice(0,3)
           .forEach(c=>{ used.add(c.idx); t.dots.push({ x:pur[c.idx].x, y:pur[c.idx].y, got:false }); });
    });
    greens = grn.map(g=>({ x:g.x, y:g.y, got:false }));
    document.getElementById('total-num').textContent = traits.length;
}

// ---- Hazard ----
function isTan(r,g,b){ return b<=r && b<=g && (r-b)>20 && Math.abs(r-g)<45 && !(g>r+15); }
function isHazard(wx, wy) {
    wx = Math.round(wx); wy = Math.round(wy); let sum = 0, n = 0;
    for (let dy=-6; dy<=6; dy+=2) for (let dx=-6; dx<=6; dx+=2) {
        const x=wx+dx, y=wy+dy; if (x<0||y<0||x>=WORLD||y>=WORLD) continue;
        const i=(y*WORLD+x)*4, r=pix[i], g=pix[i+1], b=pix[i+2];
        if (!isTan(r,g,b)) continue; sum += 0.3*r+0.59*g+0.11*b; n++;
    }
    return n>0 && (sum/n) < HAZ_LUM;
}
function findSpawn(cx, cy) {
    if (!isHazard(cx,cy)) return { x:cx, y:cy };
    for (let r=20; r<900; r+=20) for (let a=0; a<360; a+=15) {
        const x=cx+Math.cos(a*Math.PI/180)*r, y=cy+Math.sin(a*Math.PI/180)*r;
        if (x>60&&y>60&&x<WORLD-60&&y<WORLD-60&&!isHazard(x,y)) return { x:Math.round(x), y:Math.round(y) };
    }
    return { x:cx, y:cy };
}

// ---- Camera ----
function worldToScreen(wx, wy){ return { x: wx*S*cam.zoom + cam.panX, y: wy*S*cam.zoom + cam.panY }; }
function clampCam(){
    cam.zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, cam.zoom));
    const span = WORLD*S*cam.zoom, minPan = disp - span;
    cam.panX = Math.min(0, Math.max(minPan, cam.panX));
    cam.panY = Math.min(0, Math.max(minPan, cam.panY));
}
function zoomBy(f){
    const cx=disp/2, cy=disp/2, bx=(cx-cam.panX)/cam.zoom, by=(cy-cam.panY)/cam.zoom;
    cam.zoom*=f; clampCam(); cam.panX=cx-bx*cam.zoom; cam.panY=cy-by*cam.zoom; clampCam();
}

// ---- Layout ----
function layout() {
    const hudH = document.getElementById('hud').offsetHeight;
    const ctlH = document.getElementById('controls').offsetHeight;
    disp = Math.max(220, Math.min(window.innerWidth-16, window.innerHeight-hudH-ctlH-40, 820));
    S = disp / WORLD; dpr = Math.min(window.devicePixelRatio || 1, 2);
    stageEl.style.width = disp+'px'; stageEl.style.height = disp+'px';
    mapCanvas.style.width = disp+'px'; mapCanvas.style.height = disp+'px'; mapCanvas.width = Math.round(disp*dpr); mapCanvas.height = Math.round(disp*dpr);
    fogCanvas.width = Math.round(disp*dpr); fogCanvas.height = Math.round(disp*dpr);
    clampCam(); resetFog();
}
function resetFog() {
    fogCtx.setTransform(dpr,0,0,dpr,0,0); fogCtx.globalCompositeOperation='source-over';
    fogCtx.fillStyle='rgba(14,10,7,0.92)'; fogCtx.fillRect(0,0,disp,disp);
    trail.forEach(p => revealAt(p.x,p.y)); revealAt(sword.x, sword.y);
}
function revealAt(wx, wy) {
    fogCtx.globalCompositeOperation='destination-out';
    fogCtx.beginPath(); fogCtx.arc(wx*S, wy*S, FOG_REVEAL, 0, Math.PI*2); fogCtx.fill();
    fogCtx.globalCompositeOperation='source-over';
}
// Move the tip toward a target (finger + grab offset); draws only while moving, limited by remaining chalk.
function advanceTip(tx, ty) {
    tx = Math.max(0, Math.min(WORLD, tx)); ty = Math.max(0, Math.min(WORLD, ty));
    const dx = tx-sword.x, dy = ty-sword.y, d = Math.hypot(dx, dy);
    if (d < 0.5 || chalk <= 0 || downedT > 0) return;
    const step = Math.min(d, chalk), nx = sword.x+dx/d*step, ny = sword.y+dy/d*step, steps = Math.max(1, Math.ceil(step/12));
    for (let i=1;i<=steps;i++) revealAt(sword.x+(nx-sword.x)*i/steps, sword.y+(ny-sword.y)*i/steps);
    sword.x = nx; sword.y = ny; chalk -= step; trail.push({ x:sword.x, y:sword.y });
}

// ---- Chalk sprite / grab ----
function chalkRect(ss){ const h=CHALK_DISP_H, w=h*CHALK_ASPECT; return { x: ss.x - CHALK_TIP.fx*w, y: ss.y - CHALK_TIP.fy*h, w, h }; }

// ---- Input ----
function screenPt(e){ const r = stageEl.getBoundingClientRect(); return { x: e.clientX-r.left, y: e.clientY-r.top }; }
function ptToWorld(p){ return { x: Math.max(0, Math.min(WORLD, (p.x-cam.panX)/(S*cam.zoom))), y: Math.max(0, Math.min(WORLD, (p.y-cam.panY)/(S*cam.zoom))) }; }
function onChalk(p){ const cr = chalkRect(worldToScreen(sword.x, sword.y)), pad=12; return p.x>cr.x-pad && p.x<cr.x+cr.w+pad && p.y>cr.y-pad && p.y<cr.y+cr.h+pad; }
function startPinch(){ const p=[...pointers.values()]; pinch0={ dist:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y), mx:(p[0].x+p[1].x)/2, my:(p[0].y+p[1].y)/2, zoom:cam.zoom, panX:cam.panX, panY:cam.panY }; }
function updatePinch(){
    const p=[...pointers.values()]; if(p.length<2) return;
    const dist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y), mx=(p[0].x+p[1].x)/2, my=(p[0].y+p[1].y)/2;
    const baseX=(pinch0.mx-pinch0.panX)/pinch0.zoom, baseY=(pinch0.my-pinch0.panY)/pinch0.zoom;
    cam.zoom=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,pinch0.zoom*dist/pinch0.dist));
    cam.panX=mx-baseX*cam.zoom; cam.panY=my-baseY*cam.zoom; clampCam();
}
function initInput() {
    stageEl.addEventListener('pointerdown', e => {
        e.preventDefault(); const p=screenPt(e); pointers.set(e.pointerId,p);
        try { stageEl.setPointerCapture(e.pointerId); } catch(_){}
        if (pointers.size===1) { if (onChalk(p)) { const fw=ptToWorld(p); grabOffset={ x:sword.x-fw.x, y:sword.y-fw.y }; mode='sword'; } else { mode='pan'; lastPan=p; } } // grab: remember tip↔finger offset; don't move yet
        else if (pointers.size===2) { mode='pinch'; startPinch(); }
    });
    stageEl.addEventListener('pointermove', e => {
        if (!pointers.has(e.pointerId)) return; e.preventDefault();
        const p=screenPt(e); pointers.set(e.pointerId,p);
        if (mode==='sword') { const fw=ptToWorld(p); advanceTip(fw.x+grabOffset.x, fw.y+grabOffset.y); }
        else if (mode==='pan') { cam.panX+=p.x-lastPan.x; cam.panY+=p.y-lastPan.y; lastPan=p; clampCam(); }
        else if (mode==='pinch') updatePinch();
    });
    const up = e => { pointers.delete(e.pointerId); if (pointers.size===0){ mode='none'; } else if (pointers.size===1){ mode='pan'; lastPan=[...pointers.values()][0]; } };
    stageEl.addEventListener('pointerup', up); stageEl.addEventListener('pointercancel', up);
    document.getElementById('zoomin').addEventListener('click', ()=>zoomBy(1.4));
    document.getElementById('zoomout').addEventListener('click', ()=>zoomBy(1/1.4));
}

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1600); }
function endDay(){ day++; chalk=CHALK_MAX; health=100; downedT=0; document.getElementById('downed').style.display='none'; sword.x=SPAWN.x; sword.y=SPAWN.y; mode='none'; pointers.clear(); document.getElementById('day-num').textContent=day; resetFog(); toast('☀️ A new day — fresh chalk'); }

// ---- Loop ----
function tick(t) {
    const dt = Math.min(0.05, (t-lastT)/1000 || 0); lastT = t;
    const downedEl = document.getElementById('downed');
    if (downedT > 0) {                         // HP depleted → rest 10s in place, then recover (no reset/teleport)
        downedT -= dt;
        if (downedT <= 0) { downedT = 0; health = 100; downedEl.style.display = 'none'; toast('💪 Recovered!'); }
        else { downedEl.textContent = '😵 Exhausted — resting ' + Math.ceil(downedT) + 's'; downedEl.style.display = 'block'; }
    } else if (isHazard(sword.x, sword.y)) {
        health -= HAZ_DMG*dt; hazardFlash = 1;
        if (health <= 0) { health = 0; downedT = 10; toast('💥 Overwhelmed by the hazard!'); }
    }
    hazardFlash = Math.max(0, hazardFlash-dt*3);

    // collect green dots (5% → a sword-part design)
    greens.forEach(g => { if (!g.got && Math.hypot(g.x-sword.x, g.y-sword.y) < DOT_R) {
        g.got=true; if (Math.random() < GREEN_PART_CHANCE) { parts++; document.getElementById('parts-num').textContent=parts; toast('🎨 Sword part design found!'); }
    }});
    // gather the 3 purple marks → unlock the trait; reach an unlocked trait → gather it
    let found = 0;
    traits.forEach(t => {
        t.dots.forEach(d => { if (!d.got && Math.hypot(d.x-sword.x, d.y-sword.y) < DOT_R) {
            d.got=true; const got=t.dots.filter(x=>x.got).length;
            if (got===t.dots.length){ t.unlocked=true; toast(t.emoji+' Trait unlocked — go gather it!'); } else toast('🔮 Mark gathered ('+got+'/'+t.dots.length+')');
        }});
        if (!t.gathered && Math.hypot(t.x-sword.x, t.y-sword.y) < DISCOVER_R) {
            if (t.unlocked){ t.gathered=true; toast(t.emoji+' Trait gathered!'); }
            else if (!t.warned){ t.warned=true; toast('🔒 Gather the 3 nearby marks first'); }
        }
        if (t.gathered) found++;
    });
    document.getElementById('found-num').textContent = found;

    render();
    document.getElementById('hp-fill').style.width = Math.max(0,health)+'%';
    document.getElementById('chalk-fill').style.width = (chalk/CHALK_MAX*100)+'%';
    requestAnimationFrame(tick);
}

function disc(bx, by, rBase, color){ ctx.beginPath(); ctx.arc(bx, by, rBase, 0, Math.PI*2); ctx.fillStyle=color; ctx.fill(); }
function ring(bx, by, rBase, color, w){ ctx.beginPath(); ctx.arc(bx, by, rBase, 0, Math.PI*2); ctx.strokeStyle=color; ctx.lineWidth=w; ctx.stroke(); }

function render() {
    ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,disp,disp);
    ctx.save(); ctx.translate(cam.panX, cam.panY); ctx.scale(cam.zoom, cam.zoom); // base coords (world*S)
    ctx.drawImage(mapImg, 0, 0, disp, disp);

    // green dots — half size: cover the baked dot with a tan patch, then draw our own smaller one
    const rDot = 15*S, rErase = 22*S, rGreen = 7.5*S;
    greens.forEach(g => { const bx=g.x*S, by=g.y*S; disc(bx,by,rErase,TAN); if (!g.got) disc(bx,by,rGreen,'#4b9e5f'); });

    // traits + their 3 unlock marks
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font=MARKER_FONT+'px serif';
    traits.forEach(t => {
        t.dots.forEach(d => { const bx=d.x*S, by=d.y*S;
            if (d.got) disc(bx,by,rErase,TAN);
            else { disc(bx,by,rDot,'#9b59b6'); if (!t.unlocked) ring(bx,by,rDot+4*S,'rgba(155,89,182,0.9)',2/cam.zoom); }
        });
        const tx=t.x*S, ty=t.y*S;
        if (!t.unlocked) ctx.fillText('❓', tx, ty);
        else { ctx.globalAlpha = t.gathered ? 0.5 : 1; ctx.fillText(t.emoji, tx, ty); ctx.globalAlpha=1; if (t.gathered){ ctx.font='6px serif'; ctx.fillText('✅', tx+6*S, ty-6*S); ctx.font=MARKER_FONT+'px serif'; } }
    });

    // chalk trail — drawn after the dots/traits so the path stays visible on top of them
    if (trail.length>1) {
        ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=4/cam.zoom; ctx.lineJoin='round'; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(trail[0].x*S, trail[0].y*S);
        for (let i=1;i<trail.length;i++) ctx.lineTo(trail[i].x*S, trail[i].y*S);
        ctx.stroke();
    }

    ctx.drawImage(fogCanvas, 0, 0, disp, disp);
    ctx.restore();

    if (hazardFlash>0){ ctx.fillStyle='rgba(231,76,60,'+(0.3*hazardFlash)+')'; ctx.fillRect(0,0,disp,disp); }

    // chalk sprite — tip at the current path point (screen space, constant size)
    const ss = worldToScreen(sword.x, sword.y), cr = chalkRect(ss);
    if (chalkImg.complete && chalkImg.naturalWidth) { ctx.save(); ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=6; ctx.drawImage(chalkImg, cr.x, cr.y, cr.w, cr.h); ctx.restore(); }
    ctx.beginPath(); ctx.arc(ss.x, ss.y, 3, 0, Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.fill();
}

// ---- Boot ----
function boot() {
    stageEl = document.getElementById('stage');
    mapCanvas = document.getElementById('map'); ctx = mapCanvas.getContext('2d');
    fogCanvas = document.createElement('canvas'); fogCtx = fogCanvas.getContext('2d');
    document.getElementById('endday').addEventListener('click', endDay);
    window.addEventListener('resize', layout);
    initInput();
    let loaded=0; const ready=()=>{ if(++loaded>=2) init(); };
    mapImg.onload=ready; chalkImg.onload=ready; mapImg.src=MAP_SRC; chalkImg.src=CHALK_SRC;
}
function init() {
    const off=document.createElement('canvas'); off.width=WORLD; off.height=WORLD;
    const octx=off.getContext('2d',{willReadFrequently:true}); octx.drawImage(mapImg,0,0,WORLD,WORLD);
    pix=octx.getImageData(0,0,WORLD,WORLD).data;
    const sp=findSpawn(SPAWN.x,SPAWN.y); SPAWN.x=sp.x; SPAWN.y=sp.y; sword.x=sp.x; sword.y=sp.y;
    buildMarkers(); layout();
    trail.push({x:sword.x,y:sword.y}); revealAt(sword.x,sword.y);
    requestAnimationFrame(t=>{ lastT=t; requestAnimationFrame(tick); });
}
boot();
